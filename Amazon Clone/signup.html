<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="css/signup.css">
</head>

<body>
    <a href="index.html"><img class="logo" src="assets/amazon_logo_dark.png" width="100px"></a>

    <div class="signup-box">

        <h2>Sign up</h2>

        <label>Your name</label>
        <input type="text" placeholder="First and last name">

        <label>Mobile number or email</label>
        <input type="text">

        <label>Password</label>
        <input type="password" placeholder="At least 6 characters">

        <button class="continue-btn">Continue</button>

        <p class="terms">
            By continuing, you agree to Amazon's
            <a href="#">Condition of Use</a>
            and
            <a href="#">Privacy Notice</a>.
        </p>

        <a href="#" class="help">Need help</a>

        <hr>

        <p class="business-title">Buying for work?</p>
        <a href="#" class="business-link">Shop on Amazon Business</a>

    </div>

    <div class="divider">
        <span>Have an account?</span>
    </div>
    <a href="signin.html">
        <button class="login-btn">Login with Amazon account</button>
    </a>

    <div class="footer">

        <a href="#">Conditions of Use</a>
        <a href="#">Privacy Notice</a>
        <a href="#">Help</a>

        <p>© 1996-2026, Amazon.com, Inc. or its affiliates</p>

    </div>

</body>

</html>
